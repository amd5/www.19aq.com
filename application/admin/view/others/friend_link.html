{include file='/public/_header' title="友情链接列表"  nava="其他设置" navb="友情列表" /}

<div class="demoTable" style="margin-bottom: 10px;">
    <a class="layui-btn layui-btn-normal" id="approveSelected">审核通过</a>
</div>
<table class="layui-hide" id="test" lay-filter="biaoge"></table>
<fieldset class="layui-elem-field">
    <legend>添加友情链接</legend>
    <div class="layui-field-box">
        <form class="layui-form">
            <div class="layui-inline">
                <div class="layui-form-item">
                    <label class="layui-form-label">站点名称</label>
                    <div class="layui-input-block">
                        <input type="text" name="sitename" placeholder="请输入站点名称" autocomplete="off" class="layui-input">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">站点链接</label>
                    <div class="layui-input-block">
                        <input type="text" name="sitelink" placeholder="请输入站点链接" autocomplete="off" class="layui-input">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">联系方式</label>
                    <div class="layui-input-block">
                        <input type="text" name="contact" placeholder="请输入联系方式" autocomplete="off" class="layui-input">
                    </div>
                </div>
            </div>
            <div class="layui-input-block">
                <a class="layui-btn" lay-submit="" lay-filter="add">立即提交</a>
            </div>
        </form>
    </div>
</fieldset>

<script type="text/html" id="barDemo">
    <a class="layui-btn layui-btn-primary layui-btn-xs" href="{{d.siteurl}}" target="_blank">查看</a>
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
</script>

{include file='/public/_js' /}

<script>
layui.use(['form','table'], function(){
    var table = layui.table;
    var form = layui.form;

    table.render({
        elem: '#test'
        ,url:'/admin/others/friendLinkData.html'
        ,id: 'test'
        ,page: true
        ,limit: 15
        ,limits : [15,30,50,100]
        ,cols: [[
            {type:'checkbox', fixed:'left'}
            ,{type:'numbers'}
            ,{field:'id', width:80, title: 'ID', sort: true}
            ,{field:'sitename', width:130, title: '站点名称', minWidth: 150}
            ,{field:'siteurl', width:320, title: '站点Url'}
            ,{field:'Contact', width:180, title: '联系方式', align: 'center', minWidth: 150}
            ,{field:'status_text', width:110, title: '审核状态', align: 'center'}
            ,{field:'addtime', width:180, title: '添加时间'}
            ,{field:'action', width:220, title: '操作', toolbar: '#barDemo'}
        ]]
    });

    table.on('tool(biaoge)', function(obj){
        var data = obj.data;
        var Event = obj.event;
        switch(Event){
        case 'del':
            del(data);
            break;
        }
    });

    function del(e){
        layer.confirm('确定要继续删除吗?',function(index){
            var id = e.id;
            layer.close(index);
            $.ajax({
                url: 'delLink',
                data: {lid: id},
                type: 'post',
                success: function(data){
                    if (data.code == 1){
                        layer.msg('删除成功');
                        table.reload('test');
                    }else{
                        layer.msg(data.msg || '删除失败');
                    }
                },
                error: function() {
                    layer.msg('删除失败');
                }
            });
        });
    }

    form.on('submit(add)', function(data){
        $.ajax({
            url: 'linkAdd',
            data: data.field,
            type: 'post',
            success: function(res){
                if (res.code == 1) {
                    layer.msg('添加成功');
                    table.reload('test');
                } else {
                    layer.msg(res.msg || '添加失败');
                }
            },
            error: function() {
                layer.msg('添加失败');
            }
        });
        return false;
    });

    $('#approveSelected').on('click', function(){
        var checkStatus = table.checkStatus('test');
        var rows = checkStatus.data || [];
        if (!rows.length) {
            layer.msg('请选择要审核的友链');
            return;
        }
        var ids = [];
        $.each(rows, function(_, item){
            ids.push(item.id);
        });
        $.ajax({
            url: 'approveLink',
            type: 'post',
            traditional: true,
            data: {ids: ids},
            success: function(data){
                if (data.code == 1){
                    layer.msg('审核成功');
                    table.reload('test');
                }else{
                    layer.msg(data.msg || '审核失败');
                }
            },
            error: function() {
                layer.msg('审核失败');
            }
        });
    });
});
</script>
